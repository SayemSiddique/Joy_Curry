services:
  - type: web
    name: joy-curry-tandoor-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: joy-curry-pg
          property: connectionString
      - key: JWT_EXPIRES_IN
        value: 7d
      # Set to the live Vercel frontend URL(s) in the Render dashboard AFTER the
      # frontend deploy (comma-separated for multiple origins). sync:false keeps
      # it out of source control so a redeploy never carries a stale domain.
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false

databases:
  - name: joy-curry-pg
    plan: free
    databaseName: joycurry
    user: joycurry
