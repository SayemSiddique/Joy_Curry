services:
  - type: web
    name: joy-curry-tandoor-api
    runtime: node
    plan: free
    rootDir: apps/api
    # Repo is a pnpm workspace (see packageManager in root package.json) —
    # `pnpm-lock.yaml` is the source of truth for resolved versions. Plain
    # `npm install` here ignores that lockfile, re-resolves every semver
    # range fresh under npm's strict (non-pnpm) peer-dep rules, and has no
    # lockfile to fall back on — any latent version mismatch in a
    # package.json (e.g. a devDependency pinned to an incompatible major)
    # only surfaces here, at deploy time, instead of in local dev/CI.
    # `--frozen-lockfile` installs the exact tree already validated locally.
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      # Neon Postgres (pooled connection string) — set in the Render dashboard.
      # Decision 2026-07-06 (ORCHESTRATOR §8): DB lives on Neon free tier, not
      # Render-managed Postgres, so the DB outlives host changes / free-tier expiry.
      - key: DATABASE_URL
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      # Set to the live Vercel frontend URL(s) in the Render dashboard AFTER the
      # frontend deploy (comma-separated for multiple origins). sync:false keeps
      # it out of source control so a redeploy never carries a stale domain.
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
      # Stripe (Session 4) — test-mode keys until launch (S6 swaps to live).
      # Webhook secret comes from the Stripe dashboard webhook endpoint config.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Resend (transactional email) — powers sign-in OTP codes and order
      # confirmations. WITHOUT these the API cannot send sign-in codes, so
      # OTP emails never arrive in production. Set both in the Render dashboard.
      # RESEND_FROM_EMAIL must be an address on a Resend-verified domain
      # (e.g. orders@joycurry.<verified-domain>).
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
