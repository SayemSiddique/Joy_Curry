services:
  - type: web
    name: joy-curry-tandoor-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      # Neon Postgres (pooled connection string) — set in the Render dashboard.
      # Decision 2026-07-06 (ORCHESTRATOR §8): DB lives on Neon free tier, not
      # Render-managed Postgres, so the DB outlives host changes / free-tier expiry.
      - key: DATABASE_URL
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      # Set to the live Vercel frontend URL(s) in the Render dashboard AFTER the
      # frontend deploy (comma-separated for multiple origins). sync:false keeps
      # it out of source control so a redeploy never carries a stale domain.
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
