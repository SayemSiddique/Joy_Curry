name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-docs:
    name: Deploy Docsify to gh-pages /docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy docs to gh-pages branch (under /docs subdirectory)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:      ./docs
          destination_dir:  docs
          keep_files:       true
          commit_message:   'chore(docs): deploy Docsify site (M8.9)'
