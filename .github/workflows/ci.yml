name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-health:
    name: Lint, test & health check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: npx eslint .
        working-directory: apps/api

      - name: Run tests
        run: pnpm test
        working-directory: apps/api

      - name: Health check (live Render backend)
        # Requires RENDER_API_URL secret to be set in GitHub repo Settings → Secrets
        if: ${{ secrets.RENDER_API_URL != '' }}
        run: curl --fail --max-time 15 ${{ secrets.RENDER_API_URL }}/api/health
