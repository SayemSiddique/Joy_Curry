name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-health:
    name: Lint backend & health check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run ESLint
        run: npx eslint .
        working-directory: backend

      - name: Health check (live Render backend)
        # Requires RENDER_API_URL secret to be set in GitHub repo Settings → Secrets
        if: ${{ secrets.RENDER_API_URL != '' }}
        run: curl --fail --max-time 15 ${{ secrets.RENDER_API_URL }}/api/health
